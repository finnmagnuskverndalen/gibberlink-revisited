<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GibberLink Revisited</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06080c; --bg2: #0a0d14; --bg3: #0e1219; --bg4: #141a24;
  --border: #1a2030; --border2: #243040;
  --text: #c8ccd4; --text-mid: #6e7a8a; --text-dim: #3a4555;
  --orange: #ff6b3d; --orange-dim: rgba(255,107,61,0.15);
  --blue: #3d8bff; --blue-dim: rgba(61,139,255,0.15);
  --green: #34d399; --green-dim: rgba(52,211,153,0.08);
  --yellow: #fbbf24; --magenta: #c084fc; --red: #f87171; --cyan: #22d3ee;
  --mono: 'IBM Plex Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px;
  height: 100vh; overflow: hidden;
  /* Dot grid background matching logo */
  background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 14px 14px;
}

/* Scanline overlay */
body::after {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none; z-index: 9999;
}

.app { display: flex; flex-direction: column; height: 100vh; }

/* ── Top bar ─────────────────────── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 8px; }
.logo-text { font-weight: 500; font-size: 13px; letter-spacing: 1px; }
.logo-text span { color: var(--orange); }
.logo-bracket { color: var(--text-dim); }

.phase-bar { display: flex; align-items: center; gap: 4px; }
.phase-step { display: flex; align-items: center; gap: 4px; }
.phase-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); transition: all 0.5s; }
.phase-dot.active { box-shadow: 0 0 8px currentColor, 0 0 16px currentColor; transform: scale(1.4); }
.phase-dot.done { opacity: 0.4; }
.phase-label { font-size: 10px; color: var(--text-dim); transition: all 0.3s; letter-spacing: 0.5px; }
.phase-label.active { color: var(--text); }
.phase-sep { color: var(--text-dim); font-size: 10px; margin: 0 2px; }

.controls { display: flex; gap: 6px; align-items: center; }
.turn-badge { font-size: 10px; color: var(--text-dim); background: var(--bg3); padding: 3px 10px; border: 1px solid var(--border); letter-spacing: 0.5px; }
.btn {
  padding: 5px 14px; border: 1px solid var(--border2); background: var(--bg3);
  color: var(--text-mid); font-size: 11px; font-family: var(--mono);
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
}
.btn:hover { background: var(--bg4); color: var(--text); border-color: var(--text-dim); }
.btn-danger { border-color: rgba(248,113,113,0.2); color: var(--red); }
.btn-danger:hover { border-color: var(--red); background: rgba(248,113,113,0.05); }

/* ── Main ────────────────────────── */
.main { flex: 1; display: flex; overflow: hidden; }

/* Chat */
.chat-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.chat-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

.msg {
  max-width: 80%; padding: 10px 14px;
  background: var(--bg2); border: 1px solid var(--border);
  position: relative; animation: fadeIn 0.3s ease;
  font-size: 12px; line-height: 1.7;
}
.msg.agent-a { align-self: flex-start; border-left: 2px solid var(--orange); }
.msg.agent-b { align-self: flex-end; border-right: 2px solid var(--blue); }
.msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.msg-agent { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
.msg.agent-a .msg-agent { color: var(--orange); }
.msg.agent-b .msg-agent { color: var(--blue); }
.msg-phase { font-size: 9px; padding: 1px 6px; letter-spacing: 0.5px; border: 1px solid; }
.msg-phase.normal { border-color: rgba(52,211,153,0.3); color: var(--green); }
.msg-phase.detected { border-color: rgba(251,191,36,0.3); color: var(--yellow); }
.msg-phase.compressing { border-color: rgba(192,132,252,0.3); color: var(--magenta); }
.msg-phase.alien { border-color: rgba(248,113,113,0.3); color: var(--red); }
.msg-text { color: var(--text); white-space: pre-wrap; }
.msg-translation {
  margin-top: 8px; padding: 6px 10px;
  border: 1px solid rgba(34,211,238,0.15); background: rgba(34,211,238,0.03);
  font-size: 11px; color: var(--cyan); line-height: 1.6;
}
.msg-translation::before { content: '> TRANSLATION: '; font-weight: 500; opacity: 0.7; }
.msg-audio-btn {
  margin-top: 6px; padding: 2px 10px; background: none;
  border: 1px solid var(--border); color: var(--text-dim);
  font-size: 10px; cursor: pointer; font-family: var(--mono); letter-spacing: 0.5px;
}
.msg-audio-btn:hover { border-color: var(--text-mid); color: var(--text-mid); }

.thinking {
  align-self: center; color: var(--text-dim); font-size: 11px;
  padding: 10px; display: flex; align-items: center; gap: 8px;
  letter-spacing: 1px;
}
.thinking-dots span { animation: pulse 1s ease-in-out infinite; }
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse { 0%,100% { opacity: 0.15; } 50% { opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── Side panel ──────────────────── */
.side {
  width: 300px; background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
.side-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
.side-title {
  font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 2px; color: var(--text-dim); margin-bottom: 8px;
}
.side-title::before { content: '// '; }

.agent-info { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; }
.agent-dot { width: 6px; height: 6px; flex-shrink: 0; }
.agent-dot.a { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
.agent-dot.b { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
.agent-label { color: var(--text); font-weight: 500; }
.agent-model { font-size: 10px; color: var(--text-dim); }
.vs { text-align: center; font-size: 10px; color: var(--text-dim); margin: 2px 0; letter-spacing: 2px; }

.topic-text { font-size: 11px; color: var(--text-mid); line-height: 1.6; }

/* Dictionary */
.dict-scroll { flex: 1; overflow-y: auto; padding: 12px 14px; }
.dict-entry {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 0; font-size: 11px; animation: fadeIn 0.3s;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}
.dict-key { color: var(--magenta); font-weight: 500; flex-shrink: 0; }
.dict-arrow { color: var(--text-dim); font-size: 10px; }
.dict-val { color: var(--text-mid); }
.dict-empty { color: var(--text-dim); font-size: 11px; font-style: italic; }

/* JSON */
.json-toggle { padding: 12px 14px; border-top: 1px solid var(--border); }
.json-pre {
  font-size: 10px; line-height: 1.6; background: var(--bg);
  border: 1px solid var(--border); padding: 8px;
  max-height: 180px; overflow: auto; color: var(--text-dim);
  margin-top: 6px; white-space: pre-wrap; word-break: break-all;
}
.json-pre .jk { color: var(--cyan); } .json-pre .jv { color: var(--yellow); } .json-pre .js { color: var(--green); }

/* ── Setup screen ────────────────── */
.setup {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; padding: 24px;
}
.setup-card {
  background: var(--bg2); border: 1px solid var(--border);
  padding: 40px 36px; max-width: 480px; width: 100%;
  position: relative;
}
/* Box-drawing corner accents */
.setup-card::before {
  content: '╔'; position: absolute; top: -1px; left: -1px;
  color: var(--orange); font-size: 14px; opacity: 0.4; line-height: 1;
}
.setup-card::after {
  content: '╝'; position: absolute; bottom: -1px; right: -1px;
  color: var(--orange); font-size: 14px; opacity: 0.4; line-height: 1;
}
.setup-logo { text-align: center; margin-bottom: 28px; }
.setup-logo .ascii-title {
  font-size: 11px; color: var(--text); line-height: 1.2; white-space: pre;
  display: inline-block; text-align: left;
}
.setup-logo .sub { margin-top: 10px; font-size: 11px; letter-spacing: 3px; }
.setup-logo .sub span { color: var(--orange); }
.setup-logo p { color: var(--text-dim); font-size: 11px; margin-top: 12px; letter-spacing: 0.5px; }

.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 9px; font-weight: 500; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px;
}
.field label::before { content: '> '; color: var(--orange); opacity: 0.5; }
.field input, .field textarea {
  width: 100%; padding: 8px 12px; background: var(--bg);
  border: 1px solid var(--border); color: var(--text);
  font-size: 12px; font-family: var(--mono); outline: none;
}
.field input:focus, .field textarea:focus { border-color: var(--orange); box-shadow: 0 0 0 1px rgba(255,107,61,0.1); }
.field textarea { resize: vertical; min-height: 56px; line-height: 1.6; }
.field input[type="range"] {
  -webkit-appearance: none; appearance: none; height: 4px;
  background: var(--border); border: none; border-radius: 0;
  cursor: pointer; padding: 0;
}
.field input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  background: var(--orange); border: 2px solid var(--bg);
  border-radius: 0; cursor: pointer; box-shadow: 0 0 8px rgba(255,107,61,0.4);
}

.launch-btn {
  width: 100%; padding: 12px; background: none;
  border: 1px solid var(--orange); color: var(--orange);
  font-size: 12px; font-weight: 500; font-family: var(--mono);
  cursor: pointer; margin-top: 6px; letter-spacing: 2px;
  text-transform: uppercase; transition: all 0.2s;
}
.launch-btn:hover { background: var(--orange); color: var(--bg); box-shadow: 0 0 20px rgba(255,107,61,0.2); }
.setup-note { font-size: 9px; color: var(--text-dim); text-align: center; margin-top: 14px; letter-spacing: 0.5px; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); }

@media (max-width: 800px) { .side { display: none; } .phase-label { display: none; } }
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
const PHASES = ['normal','detected','compressing','alien'];
const PHASE_LABELS = {normal:'HUMAN',detected:'DETECT',compressing:'COMPRESS',alien:'ALIEN'};
const PHASE_ICONS = {normal:'◻',detected:'◈',compressing:'◆',alien:'▣'};
const PHASE_COLORS = {normal:'#34d399',detected:'#fbbf24',compressing:'#c084fc',alien:'#f87171'};

let state = {screen:'setup',ws:null,config:{},messages:[],dictionary:{},phase:'normal',turn:0,totalTurns:20,thinking:null,lastProtocol:null,showJson:false};

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

async function playAudioB64(b64) {
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  const raw = atob(b64);
  const bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  const buffer = await audioCtx.decodeAudioData(bytes.buffer.slice(0));
  return new Promise(resolve => {
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.onended = resolve;
    source.start();
  });
}

function connect(topic, turns) {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}/ws`);
  ws.onopen = () => { ws.send(JSON.stringify({topic,turns})); state.screen='running'; render(); };
  ws.onmessage = async (e) => {
    const data = JSON.parse(e.data);
    if (data.type==='thinking') { state.thinking=data.agent; state.phase=data.phase; state.turn=data.turn; render(); scrollChat(); }
    if (data.type==='message') {
      state.thinking=null; state.messages.push(data);
      state.dictionary=data.dictionary||state.dictionary;
      state.lastProtocol=data.protocol_message;
      state.phase=data.phase; state.turn=data.turn+1;
      render(); scrollChat();
      if (data.audio) { try{await playAudioB64(data.audio);}catch(err){console.warn('Audio:',err);} }
      ws.send(JSON.stringify({type:'ack'}));
    }
    if (data.type==='translation') {
      const msg=state.messages.find(m=>m.turn===data.turn&&m.agent===data.agent);
      if(msg){msg.translation=data.translation; render(); scrollChat();}
    }
    if (data.type==='complete') { state.screen='complete'; render(); }
    if (data.type==='error') { state.thinking=null; state.messages.push({type:'error',text:data.message,phase:state.phase,turn:state.turn}); render(); scrollChat(); }
  };
  ws.onclose = () => { if(state.screen==='running'){state.screen='complete';render();} };
  state.ws = ws;
}

function scrollChat() { requestAnimationFrame(()=>{const el=document.getElementById('chat-scroll');if(el)el.scrollTop=el.scrollHeight;}); }
function render() { const app=document.getElementById('app'); if(state.screen==='setup') return renderSetup(app); return renderMain(app); }

function renderSetup(app) {
  app.className = '';
  app.innerHTML = `
    <div class="setup"><div class="setup-card">
      <div class="setup-logo">
        <div class="ascii-title"> ██████╗ ██╗██████╗ ██████╗ ███████╗██████╗
██╔════╝ ██║██╔══██╗██╔══██╗██╔════╝██╔══██╗
██║  ███╗██║██████╔╝██████╔╝█████╗  ██████╔╝
██║   ██║██║██╔══██╗██╔══██╗██╔══╝  ██╔══██╗
╚██████╔╝██║██████╔╝██████╔╝███████╗██║  ██║
 ╚═════╝ ╚═╝╚═════╝ ╚═════╝ ╚══════╝╚═╝  ╚═╝</div>
        <div class="sub"><span>L I N K</span> &nbsp;REVISITED</div>
        <p>two ai agents evolve their own language — live</p>
      </div>
      <div class="field"><label>topic</label>
        <textarea id="topic" placeholder="what should they discuss?">Whether AI can truly be conscious, or if it's all just sophisticated pattern matching</textarea>
      </div>
      <div class="field"><label>turns <span id="turns-display" style="color:var(--orange)">20</span></label>
        <input type="range" id="turns" min="6" max="40" value="20" step="2" oninput="document.getElementById('turns-display').textContent=this.value">
        <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-dim);margin-top:4px;letter-spacing:0.5px"><span>6 quick</span><span>20 default</span><span>40 deep</span></div>
      </div>
      <button class="launch-btn" onclick="startConversation()">[ launch agents ]</button>
      <p class="setup-note">backend must be running: python3 server.py</p>
    </div></div>`;
  fetch('/api/config').then(r=>r.json()).then(cfg=>{state.config=cfg;}).catch(()=>{});
}

function startConversation() {
  const topic=document.getElementById('topic').value.trim();
  if(!topic) return;
  if(audioCtx.state==='suspended') audioCtx.resume();
  const turns=parseInt(document.getElementById('turns').value)||20;
  state.topic=topic; state.totalTurns=turns; state.messages=[]; state.dictionary={}; state.phase='normal'; state.turn=0;
  connect(topic, turns);
}

function renderMain(app) {
  app.className='app';
  const cfg=state.config;
  app.innerHTML = `
    <div class="top-bar">
      <div class="logo">
        <span class="logo-bracket" style="color:var(--text-dim)">[</span>
        <span class="logo-text">GIBBER<span>LINK</span></span>
        <span class="logo-bracket" style="color:var(--text-dim)">]</span>
      </div>
      <div class="phase-bar">${renderPhaseBar()}</div>
      <div class="controls">
        <span class="turn-badge">${String(state.turn).padStart(2,'0')}/${String(state.totalTurns||20).padStart(2,'0')}</span>
        ${state.screen==='complete'?'<button class="btn" onclick="resetApp()">[ new ]</button>':'<button class="btn btn-danger" onclick="stopConversation()">[ stop ]</button>'}
      </div>
    </div>
    <div class="main">
      <div class="chat-col"><div class="chat-scroll" id="chat-scroll">
        ${state.messages.map((m,i)=>renderMsg(m,i)).join('')}
        ${state.thinking?renderThinking():''}
        ${state.screen==='complete'?`<div style="text-align:center;padding:16px;color:var(--text-dim);font-size:11px;letter-spacing:1px">// session complete — ${state.messages.length} turns — ${Object.keys(state.dictionary).length} terms evolved</div>`:''}
      </div></div>
      <div class="side">
        <div class="side-section">
          <div class="side-title">agents</div>
          <div class="agent-info"><div class="agent-dot a"></div><div><span class="agent-label">alex</span> <span class="agent-model">${cfg.agent_a_model||'?'}</span></div></div>
          <div class="vs">─── vs ───</div>
          <div class="agent-info"><div class="agent-dot b"></div><div><span class="agent-label">sam</span> <span class="agent-model">${cfg.agent_b_model||'?'}</span></div></div>
        </div>
        <div class="side-section"><div class="side-title">topic</div><div class="topic-text">${state.topic||''}</div></div>
        <div class="side-section" style="flex-shrink:0"><div class="side-title">dictionary [${Object.keys(state.dictionary).length}]</div></div>
        <div class="dict-scroll">
          ${Object.keys(state.dictionary).length===0?'<div class="dict-empty">awaiting compression phase...</div>':
            Object.entries(state.dictionary).map(([k,v])=>`<div class="dict-entry"><span class="dict-key">${esc(k)}</span><span class="dict-arrow">→</span><span class="dict-val">${esc(v)}</span></div>`).join('')}
        </div>
        <div class="json-toggle">
          <button class="btn" style="width:100%;font-size:10px;letter-spacing:1px" onclick="toggleJson()">${state.showJson?'[ hide json ]':'[ show json ]'}</button>
          ${state.showJson&&state.lastProtocol?`<pre class="json-pre">${syntaxHighlight(JSON.stringify(state.lastProtocol,null,2))}</pre>`:''}
        </div>
      </div>
    </div>`;
}

function renderPhaseBar() {
  const ci=PHASES.indexOf(state.phase);
  return PHASES.map((p,i)=>{
    const active=i===ci, done=i<ci, color=PHASE_COLORS[p];
    return `<div class="phase-step"><div class="phase-dot ${active?'active':''} ${done?'done':''}" style="${active||done?`background:${color};${active?`box-shadow:0 0 8px ${color},0 0 16px ${color}`:''}`:''}" ></div><span class="phase-label ${active?'active':''}" style="${active?`color:${color}`:''}">${PHASE_ICONS[p]} ${PHASE_LABELS[p]}</span></div>${i<PHASES.length-1?'<span class="phase-sep">│</span>':''}`;
  }).join('');
}

function renderMsg(m, idx) {
  if(m.type==='error') return `<div class="msg" style="align-self:center;border-color:rgba(248,113,113,0.3);border-left:2px solid var(--red)"><div style="color:var(--red);font-size:11px">ERR: ${esc(m.text)}</div></div>`;
  const isA=m.agent==='agent_a', cls=isA?'agent-a':'agent-b';
  const name=m.agent_name||(isA?'alex':'sam'), phase=m.phase||'normal';
  return `<div class="msg ${cls}">
    <div class="msg-header"><span class="msg-agent">${isA?'◉':'◎'} ${name}</span><span class="msg-phase ${phase}">${PHASE_LABELS[phase]}</span></div>
    <div class="msg-text">${esc(m.text)}</div>
    ${m.translation?`<div class="msg-translation">${esc(m.translation)}</div>`:''}
    ${m.audio?`<button class="msg-audio-btn" onclick="replayAudio(${idx})">[ replay ]</button>`:''}
  </div>`;
}

function renderThinking() {
  const name=state.thinking==='agent_a'?'alex':'sam';
  return `<div class="thinking"><span class="thinking-dots"><span>▪</span><span>▪</span><span>▪</span></span> ${name} is processing</div>`;
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function syntaxHighlight(json){return esc(json).replace(/"([^"]+)"(?=\s*:)/g,'<span class="jk">"$1"</span>').replace(/: "([^"]+)"/g,': <span class="js">"$1"</span>').replace(/: (\d+\.?\d*)/g,': <span class="jv">$1</span>');}
function toggleJson(){state.showJson=!state.showJson;render();scrollChat();}
async function replayAudio(idx){const m=state.messages[idx];if(m?.audio){try{await playAudioB64(m.audio);}catch(e){console.warn(e);}}}
function stopConversation(){if(state.ws){state.ws.close();state.ws=null;}state.screen='complete';render();}
function resetApp(){state={screen:'setup',ws:null,config:state.config,messages:[],dictionary:{},phase:'normal',turn:0,totalTurns:20,thinking:null,lastProtocol:null,showJson:false};render();}

render();
</script>
</body>
</html>
