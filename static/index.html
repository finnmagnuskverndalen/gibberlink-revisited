<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GibberLink Revisited</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06080c; --bg2: #0a0d14; --bg3: #0e1219; --bg4: #141a24;
  --border: #1a2030; --border2: #243040;
  --text: #c8ccd4; --text-mid: #6e7a8a; --text-dim: #3a4555;
  --orange: #ff6b3d; --orange-dim: rgba(255,107,61,0.15);
  --blue: #3d8bff; --blue-dim: rgba(61,139,255,0.15);
  --green: #34d399; --green-dim: rgba(52,211,153,0.08);
  --yellow: #fbbf24; --magenta: #c084fc; --red: #f87171; --cyan: #22d3ee;
  --mono: 'IBM Plex Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px;
  height: 100vh; overflow: hidden;
  background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 14px 14px;
}
body::after {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none; z-index: 9999;
}
.app { display: flex; flex-direction: column; height: 100vh; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); }

/* ‚ĒÄ‚ĒÄ Top bar ‚ĒÄ‚ĒÄ */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: var(--bg2);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 8px; }
.logo-bracket { color: var(--text-dim); }
.logo-text { font-weight: 500; font-size: 13px; letter-spacing: 1px; }
.logo-text span { color: var(--orange); }

.phase-bar { display: flex; align-items: center; gap: 4px; }
.phase-step { display: flex; align-items: center; gap: 4px; }
.phase-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); transition: all 0.5s; }
.phase-dot.active { box-shadow: 0 0 8px currentColor, 0 0 16px currentColor; transform: scale(1.4); }
.phase-dot.done { opacity: 0.4; }
.phase-label { font-size: 10px; color: var(--text-dim); transition: all 0.3s; letter-spacing: 0.5px; }
.phase-label.active { color: var(--text); }
.phase-sep { color: var(--text-dim); font-size: 10px; margin: 0 2px; }

.controls { display: flex; gap: 6px; align-items: center; }
.turn-badge { font-size: 10px; color: var(--text-dim); background: var(--bg3); padding: 3px 10px; border: 1px solid var(--border); letter-spacing: 0.5px; }
.tts-badge { font-size: 9px; color: var(--text-dim); padding: 3px 8px; border: 1px solid var(--border); letter-spacing: 0.5px; }
.tts-badge.ready { color: var(--green); border-color: rgba(52,211,153,0.3); }
.btn {
  padding: 5px 14px; border: 1px solid var(--border2); background: var(--bg3);
  color: var(--text-mid); font-size: 11px; font-family: var(--mono);
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
}
.btn:hover { background: var(--bg4); color: var(--text); border-color: var(--text-dim); }
.btn-danger { border-color: rgba(248,113,113,0.2); color: var(--red); }
.btn-danger:hover { border-color: var(--red); background: rgba(248,113,113,0.05); }

/* ‚ĒÄ‚ĒÄ Main ‚ĒÄ‚ĒÄ */
.main { flex: 1; display: flex; overflow: hidden; }
.chat-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.chat-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

/* Consensus bar */
.consensus-bar {
  padding: 6px 16px; background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.consensus-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
.consensus-track { flex: 1; height: 4px; background: var(--border); position: relative; }
.consensus-fill { height: 100%; background: var(--green); transition: width 0.6s ease; position: absolute; left: 0; top: 0; }
.consensus-fill::after {
  content: ''; position: absolute; right: -1px; top: -3px; width: 2px; height: 10px;
  background: var(--green); box-shadow: 0 0 8px var(--green);
}
.consensus-pct { font-size: 10px; color: var(--green); min-width: 36px; text-align: right; }

/* Messages */
.msg {
  max-width: 85%; padding: 10px 14px;
  background: var(--bg2); border: 1px solid var(--border);
  position: relative; animation: fadeIn 0.3s ease;
  font-size: 12px; line-height: 1.7;
}
.msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.msg-agent { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
.msg-role { font-size: 9px; color: var(--text-dim); }
.msg-phase { font-size: 9px; padding: 1px 6px; letter-spacing: 0.5px; border: 1px solid; }
.msg-phase.problem  { border-color: rgba(251,191,36,0.3); color: var(--yellow); }
.msg-phase.debate   { border-color: rgba(255,107,61,0.3); color: var(--orange); }
.msg-phase.converge { border-color: rgba(192,132,252,0.3); color: var(--magenta); }
.msg-phase.solution { border-color: rgba(52,211,153,0.3); color: var(--green); }
.msg-text { color: var(--text); white-space: pre-wrap; }
.msg-audio-btn {
  margin-top: 6px; padding: 2px 10px; background: none;
  border: 1px solid var(--border); color: var(--text-dim);
  font-size: 10px; cursor: pointer; font-family: var(--mono); letter-spacing: 0.5px;
}
.msg-audio-btn:hover { border-color: var(--text-mid); color: var(--text-mid); }
.proposal-inline {
  margin-top: 8px; padding: 6px 10px;
  border: 1px solid rgba(52,211,153,0.2); background: rgba(52,211,153,0.03);
  font-size: 11px; line-height: 1.6;
}
.proposal-inline::before { content: '‚óą PROPOSAL: '; color: var(--green); font-weight: 500; font-size: 10px; }

.thinking {
  align-self: center; color: var(--text-dim); font-size: 11px;
  padding: 10px; display: flex; align-items: center; gap: 8px; letter-spacing: 1px;
}
.thinking-dots span { animation: pulse 1s ease-in-out infinite; }
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse { 0%,100% { opacity: 0.15; } 50% { opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ‚ĒÄ‚ĒÄ Side panel ‚ĒÄ‚ĒÄ */
.side {
  width: 300px; background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
.side-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
.side-title { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 8px; }
.side-title::before { content: '// '; }

.agent-info { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; }
.agent-dot { width: 6px; height: 6px; flex-shrink: 0; }
.agent-label { color: var(--text); font-weight: 500; }
.agent-role { font-size: 10px; color: var(--text-dim); }
.topic-text { font-size: 11px; color: var(--text-mid); line-height: 1.6; }

.stats-row { display: flex; gap: 8px; margin-top: 8px; }
.stat-item { flex: 1; background: var(--bg3); border: 1px solid var(--border); padding: 5px 8px; }
.stat-label { font-size: 8px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-size: 14px; font-weight: 500; color: var(--text); margin-top: 1px; }

/* Proposals scroll */
.proposals-scroll { flex: 1; overflow-y: auto; padding: 12px 14px; }
.proposal-entry {
  padding: 8px 10px; margin-bottom: 6px; font-size: 11px;
  border: 1px solid var(--border); background: var(--bg3); animation: fadeIn 0.3s;
}
.proposal-author { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
.proposal-text { color: var(--text-mid); line-height: 1.5; font-size: 10px; }
.proposal-empty { color: var(--text-dim); font-size: 11px; font-style: italic; }

/* JSON */
.json-toggle { padding: 12px 14px; border-top: 1px solid var(--border); }
.json-pre {
  font-size: 10px; line-height: 1.6; background: var(--bg);
  border: 1px solid var(--border); padding: 8px;
  max-height: 180px; overflow: auto; color: var(--text-dim);
  margin-top: 6px; white-space: pre-wrap; word-break: break-all;
}
.json-pre .jk { color: var(--cyan); } .json-pre .jv { color: var(--yellow); } .json-pre .js { color: var(--green); }

/* ‚ĒÄ‚ĒÄ Setup ‚ĒÄ‚ĒÄ */
.setup { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 24px; }
.setup-card {
  background: var(--bg2); border: 1px solid var(--border);
  padding: 40px 36px; max-width: 520px; width: 100%; position: relative;
}
.setup-card::before { content: '‚ēĒ'; position: absolute; top: -1px; left: -1px; color: var(--orange); font-size: 14px; opacity: 0.4; line-height: 1; }
.setup-card::after { content: '‚ēĚ'; position: absolute; bottom: -1px; right: -1px; color: var(--orange); font-size: 14px; opacity: 0.4; line-height: 1; }
.setup-logo { text-align: center; margin-bottom: 28px; }
.setup-logo .ascii-title { font-size: 11px; color: var(--text); line-height: 1.2; white-space: pre; display: inline-block; text-align: left; }
.setup-logo .sub { margin-top: 10px; font-size: 11px; letter-spacing: 3px; }
.setup-logo .sub span { color: var(--orange); }
.setup-logo p { color: var(--text-dim); font-size: 11px; margin-top: 12px; letter-spacing: 0.5px; }
.setup-logo .council-badge {
  display: inline-block; margin-top: 8px; padding: 2px 12px;
  border: 1px solid rgba(52,211,153,0.3); color: var(--green);
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
}
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 9px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
.field label::before { content: '> '; color: var(--orange); opacity: 0.5; }
.field textarea {
  width: 100%; padding: 8px 12px; background: var(--bg);
  border: 1px solid var(--border); color: var(--text);
  font-size: 12px; font-family: var(--mono); outline: none;
  resize: vertical; min-height: 56px; line-height: 1.6;
}
.field textarea:focus { border-color: var(--orange); box-shadow: 0 0 0 1px rgba(255,107,61,0.1); }
.field input[type="range"] {
  width: 100%; -webkit-appearance: none; appearance: none; height: 4px;
  background: var(--border); border: none; cursor: pointer; padding: 0;
}
.field input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  background: var(--orange); border: 2px solid var(--bg);
  cursor: pointer; box-shadow: 0 0 8px rgba(255,107,61,0.4);
}
.topic-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.topic-chip {
  font-size: 9px; padding: 2px 8px; border: 1px solid var(--border); color: var(--text-dim);
  cursor: pointer; letter-spacing: 0.5px; transition: all 0.15s; font-family: var(--mono); background: none;
}
.topic-chip:hover { border-color: var(--orange); color: var(--orange); }
.launch-btn {
  width: 100%; padding: 12px; background: none;
  border: 1px solid var(--orange); color: var(--orange);
  font-size: 12px; font-weight: 500; font-family: var(--mono);
  cursor: pointer; margin-top: 6px; letter-spacing: 2px;
  text-transform: uppercase; transition: all 0.2s;
}
.launch-btn:hover { background: var(--orange); color: var(--bg); box-shadow: 0 0 20px rgba(255,107,61,0.2); }
.setup-note { font-size: 9px; color: var(--text-dim); text-align: center; margin-top: 14px; letter-spacing: 0.5px; }

/* Final solution */
.final-solution {
  margin: 12px 0; padding: 14px; border: 1px solid rgba(52,211,153,0.3);
  background: rgba(52,211,153,0.04); animation: fadeIn 0.5s; align-self: stretch;
}
.final-solution-header { font-size: 10px; font-weight: 600; color: var(--green); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.final-solution-header::before { content: '‚óą '; }
.final-solution-text { color: var(--text); line-height: 1.7; font-size: 12px; }

/* Vote badges on proposals */
.vote-row { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.vote-badge {
  font-size: 8px; padding: 1px 5px; border: 1px solid var(--border);
  letter-spacing: 0.5px; display: inline-flex; align-items: center; gap: 3px;
}
.vote-badge.agree { border-color: rgba(52,211,153,0.3); color: var(--green); }
.vote-badge.disagree { border-color: rgba(248,113,113,0.3); color: var(--red); }
.vote-badge.amend { border-color: rgba(251,191,36,0.3); color: var(--yellow); }

/* Chairman verdict */
.chairman-card {
  margin: 12px 0; padding: 16px; align-self: stretch;
  border: 1px solid rgba(34,211,238,0.3); background: rgba(34,211,238,0.04);
  animation: fadeIn 0.5s;
}
.chairman-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.chairman-dot {
  width: 8px; height: 8px; background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan); flex-shrink: 0;
}
.chairman-name {
  font-size: 10px; font-weight: 600; color: var(--cyan);
  letter-spacing: 1px; text-transform: uppercase;
}
.chairman-role { font-size: 9px; color: var(--text-dim); }
.chairman-label {
  font-size: 9px; padding: 1px 6px; border: 1px solid rgba(34,211,238,0.3);
  color: var(--cyan); letter-spacing: 0.5px; margin-left: auto;
}
.chairman-text { color: var(--text); line-height: 1.8; font-size: 12px; }
.chairman-audio-btn {
  margin-top: 8px; padding: 2px 10px; background: none;
  border: 1px solid var(--border); color: var(--text-dim);
  font-size: 10px; cursor: pointer; font-family: var(--mono); letter-spacing: 0.5px;
}
.chairman-audio-btn:hover { border-color: var(--cyan); color: var(--cyan); }

/* Proposal scoreboard in chairman card */
.scoreboard { margin-top: 12px; border-top: 1px solid rgba(34,211,238,0.15); padding-top: 10px; }
.scoreboard-title { font-size: 9px; font-weight: 600; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.scoreboard-title::before { content: '// '; }
.scoreboard-item {
  display: flex; align-items: flex-start; gap: 8px; padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 11px;
}
.scoreboard-item:last-child { border-bottom: none; }
.scoreboard-rank {
  font-size: 12px; font-weight: 600; color: var(--cyan); min-width: 20px; text-align: center;
  flex-shrink: 0; margin-top: 1px;
}
.scoreboard-rank.gold { color: var(--yellow); }
.scoreboard-rank.silver { color: var(--text-mid); }
.scoreboard-rank.bronze { color: var(--orange); }
.scoreboard-body { flex: 1; }
.scoreboard-proposal-text { color: var(--text); line-height: 1.5; font-size: 10px; }
.scoreboard-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
.scoreboard-author { font-size: 9px; color: var(--text-dim); }
.scoreboard-votes { display: flex; gap: 3px; }
.scoreboard-vote-pill {
  font-size: 8px; padding: 0px 4px; border: 1px solid; letter-spacing: 0.3px;
}
.scoreboard-vote-pill.agree { border-color: rgba(52,211,153,0.3); color: var(--green); }
.scoreboard-vote-pill.disagree { border-color: rgba(248,113,113,0.3); color: var(--red); }
.scoreboard-vote-pill.amend { border-color: rgba(251,191,36,0.3); color: var(--yellow); }
.scoreboard-score {
  font-size: 9px; color: var(--text-dim); margin-left: auto; flex-shrink: 0;
}

@media (max-width: 800px) { .side { display: none; } .phase-label { display: none; } }
</style>
</head>
<body>
<div id="app" class="app"></div>

<script>
const PHASES = ['problem','debate','converge','solution'];
const PHASE_LABELS = {problem:'DEFINE', debate:'DEBATE', converge:'CONVERGE', solution:'SOLVE'};
const PHASE_ICONS  = {problem:'‚óá', debate:'‚óÜ', converge:'‚óą', solution:'‚Ė£'};
const PHASE_COLORS = {problem:'#fbbf24', debate:'#ff6b3d', converge:'#c084fc', solution:'#34d399'};

const AGENT_RAW_COLORS = {orange:'#ff6b3d', blue:'#3d8bff', green:'#34d399', magenta:'#c084fc', cyan:'#22d3ee'};
const AGENT_CSS_COLORS = {orange:'var(--orange)', blue:'var(--blue)', green:'var(--green)', magenta:'var(--magenta)', cyan:'var(--cyan)'};

const PROBLEM_CHIPS = [
  'how to reduce meeting fatigue in remote teams',
  'design an AI-powered education system for underserved areas',
  'solve urban food waste at scale',
  'make open source financially sustainable',
  'prevent social media from harming teen mental health',
  'decarbonize shipping and logistics',
];

let state = {
  screen:'setup', ws:null, config:{}, messages:[], proposals:[],
  proposalRecords:[], chairmanVerdict:null,
  phase:'problem', turn:0, totalTurns:20, consensus:0,
  thinking:null, lastProtocol:null, showJson:false,
  audioData:{}, stopped:false, topic:'', agentRoster:null,
};

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioQueue = Promise.resolve();
let currentSource = null;

async function playAudioB64(b64, format) {
  try {
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const raw = atob(b64);
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    const buffer = await audioCtx.decodeAudioData(bytes.buffer.slice(0));
    return new Promise(resolve => {
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);
      currentSource = source;
      // Safety timeout: resolve even if onended never fires (e.g. tab backgrounded)
      const timeout = setTimeout(() => { currentSource = null; resolve(); }, (buffer.duration * 1000) + 3000);
      source.onended = () => { clearTimeout(timeout); currentSource = null; resolve(); };
      source.start();
    });
  } catch(e) { console.warn('Audio playback failed:', e); }
}

// ‚ĒÄ‚ĒÄ TTS health poll ‚ĒÄ‚ĒÄ
function pollTtsReady() {
  if (!state.config.tts_enabled || state.config.tts_provider === 'elevenlabs' || state.config.tts_provider === 'none') return;
  const check = () => {
    fetch('/api/tts-health').then(r => r.ok ? r.json() : null).then(d => {
      const badge = document.getElementById('tts-badge');
      if (!badge) return;
      if (d && d.status === 'ok') {
        badge.textContent = `tts:${state.config.tts_provider} ‚úď`;
        badge.className = 'tts-badge ready';
      } else {
        badge.textContent = `tts:${state.config.tts_provider} loading...`;
        setTimeout(check, 2000);
      }
    }).catch(() => setTimeout(check, 2000));
  };
  check();
}

// ‚ĒÄ‚ĒÄ WebSocket ‚ĒÄ‚ĒÄ
function connect(topic, turns) {
  state.stopped = false;
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}/ws`);

  ws.onopen = () => {
    ws.send(JSON.stringify({topic, turns}));
    state.screen = 'running';
    render();
    pollTtsReady();
  };

  ws.onmessage = async (e) => {
    if (state.stopped) return;
    const data = JSON.parse(e.data);

    if (data.type === 'thinking') {
      state.thinking = data.agent;
      state.phase = data.phase;
      state.turn = data.turn;
      render(); scrollChat();
    }

    if (data.type === 'message') {
      state.thinking = null;
      state.messages.push(data);
      if (data.audio) state.audioData[data.turn] = {b64: data.audio, format: data.audio_format || 'mp3'};
      if (data.proposals) state.proposals = data.proposals;
      if (data.proposal_records) state.proposalRecords = data.proposal_records;
      if (data.agent_roster && !state.agentRoster) state.agentRoster = data.agent_roster;
      state.lastProtocol = data.protocol_message;
      state.phase = data.phase;
      state.turn = data.turn + 1;
      state.consensus = data.consensus || state.consensus;
      render(); scrollChat();

      // Ack IMMEDIATELY so the server can start generating the next turn
      if (!state.stopped && ws.readyState === 1) {
        ws.send(JSON.stringify({type:'ack'}));
      }

      // Queue audio playback in the background
      if (data.audio) {
        audioQueue = audioQueue.then(async () => {
          if (!state.stopped) {
            try { await playAudioB64(data.audio, data.audio_format); } catch(e) { console.warn('Audio error:', e); }
          }
        }).catch(e => { console.warn('Audio queue error:', e); });
      }
    }

    if (data.type === 'chairman') {
      state.thinking = null;
      state.chairmanVerdict = data;
      if (data.proposal_records) state.proposalRecords = data.proposal_records;
      if (data.audio) state.audioData['chairman'] = {b64: data.audio, format: data.audio_format || 'mp3'};
      render(); scrollChat();

      // Ack immediately
      if (!state.stopped && ws.readyState === 1) {
        ws.send(JSON.stringify({type:'ack'}));
      }

      // Queue chairman audio
      if (data.audio) {
        audioQueue = audioQueue.then(async () => {
          if (!state.stopped) {
            try { await playAudioB64(data.audio, data.audio_format); } catch(e) { console.warn('Audio error:', e); }
          }
        }).catch(e => { console.warn('Audio queue error:', e); });
      }
    }

    if (data.type === 'complete') {
      state.thinking = null;
      state.screen = 'complete';
      state.consensus = data.consensus || 100;
      if (data.proposal_records) state.proposalRecords = data.proposal_records;
      render();
    }

    if (data.type === 'error') {
      state.thinking = null;
      state.messages.push({type:'error', text:data.message, phase:state.phase, turn:state.turn});
      render(); scrollChat();
    }
  };

  ws.onclose = () => { if (state.screen === 'running') { state.screen = 'complete'; render(); } };
  state.ws = ws;
}

function scrollChat() {
  requestAnimationFrame(() => {
    const el = document.getElementById('chat-scroll');
    if (el) el.scrollTop = el.scrollHeight;
  });
}

}

 ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ</div>

function startConversation() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const turns = parseInt(document.getElementById('turns').value) || 16;
  state.topic = topic;
  state.totalTurns = turns;
  state.messages = [];
  state.proposals = [];
  state.proposalRecords = [];
  state.chairmanVerdict = null;
  state.phase = 'problem';
  state.turn = 0;
  state.consensus = 0;
  state.audioData = {};
  state.lastProtocol = null;
  state.agentRoster = null;
  connect(topic, turns);
}

function stopConversation() {
  state.stopped = true;
  try { currentSource?.stop(); } catch(e) {}
  currentSource = null;
  if (state.ws) { state.ws.close(); state.ws = null; }
  state.screen = 'complete';
  render();
}

function resetApp() {
  state = {
    screen:'setup', ws:null, config:state.config,
    messages:[], proposals:[], proposalRecords:[], chairmanVerdict:null,
    phase:'problem', turn:0, totalTurns:16,
    consensus:0, thinking:null, lastProtocol:null, showJson:false,
    audioData:{}, stopped:false, topic:'', agentRoster:null,
  };
  render();
}

function exportTranscript() {
  const data = {
    topic: state.topic, turns: state.messages.length,
    proposals: state.proposalRecords,
    consensus: state.consensus,
    chairman_verdict: state.chairmanVerdict ? state.chairmanVerdict.text : null,
    messages: state.messages.filter(m => m.type !== 'error').map(m => ({
      agent: m.agent_name, role: m.agent_role, phase: m.phase,
      turn: m.turn, text: m.text, consensus: m.consensus,
    })),
    exported_at: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `gibberlink-revisited-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function toggleJson() { state.showJson = !state.showJson; render(); scrollChat(); }

async function replayAudio(turn) {
  const ad = state.audioData[turn];
  if (ad) { try { await playAudioB64(ad.b64, ad.format); } catch(e) { console.warn(e); } }
}

function syntaxHighlight(json) {
  return esc(json)
    .replace(/"([^"]+)"(?=\s*:)/g, '<span class="jk">"$1"</span>')
    .replace(/: "([^"]+)"/g, ': <span class="js">"$1"</span>')
    .replace(/: (\d+\.?\d*)/g, ': <span class="jv">$1</span>');
}

function renderPhaseBar() {
  const ci = PHASES.indexOf(state.phase);
  return PHASES.map((p, i) => {
    const active = i === ci, done = i < ci, color = PHASE_COLORS[p];
    return `<div class="phase-step">
      <div class="phase-dot ${active?'active':''} ${done?'done':''}"
        style="${active||done ? `background:${color};${active?`box-shadow:0 0 8px ${color},0 0 16px ${color}`:''}` : ''}">
      </div>
      <span class="phase-label ${active?'active':''}" style="${active?`color:${color}`:''}">
        ${PHASE_ICONS[p]} ${PHASE_LABELS[p]}
      </span>
    </div>${i < PHASES.length-1 ? '<span class="phase-sep">‚Ēā</span>' : ''}`;
  }).join('');
}

function renderMsg(m, idx) {
  if (m.type === 'error') {
    return `<div class="msg" style="align-self:center;border-color:rgba(248,113,113,0.3);border-left:2px solid var(--red)"><div style="color:var(--red);font-size:11px">ERR: ${esc(m.text)}</div></div>`;
  }
  const color = AGENT_RAW_COLORS[m.agent_color] || '#ff6b3d';
  const cssColor = AGENT_CSS_COLORS[m.agent_color] || 'var(--orange)';
  const agentIdx = state.agentRoster ? state.agentRoster.findIndex(a => a.id === m.agent) : 0;
  const isLeft = agentIdx % 2 === 0;
  const borderStyle = isLeft ? `border-left:2px solid ${color}` : `border-right:2px solid ${color}`;
  const ad = state.audioData[m.turn];
  const phase = m.phase || 'problem';
  const hasProposals = m.new_proposals && m.new_proposals.length > 0;

  return `<div class="msg" style="max-width:85%;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);position:relative;animation:fadeIn 0.3s ease;font-size:12px;line-height:1.7;${isLeft?'align-self:flex-start':'align-self:flex-end'};${borderStyle}">
    <div class="msg-header">
      <span class="msg-agent" style="color:${color}">‚óČ ${m.agent_name || 'agent'}</span>
      <span class="msg-role">${m.agent_role || ''}</span>
      <span class="msg-phase ${phase}">${PHASE_LABELS[phase]||phase}</span>
    </div>
    <div class="msg-text">${esc(m.text)}</div>
    ${hasProposals ? m.new_proposals.map(p => `<div class="proposal-inline">${esc(p)}</div>`).join('') : ''}
    ${ad ? `<button class="msg-audio-btn" onclick="replayAudio(${m.turn})">[ replay ]</button>` : ''}
  </div>`;
}

function renderThinking() {
  if (!state.thinking) return '';
  if (state.thinking === 'chairman') {
    return `<div class="thinking"><span class="thinking-dots"><span>‚Ė™</span><span>‚Ė™</span><span>‚Ė™</span></span> nexus is preparing the final verdict</div>`;
  }
  const roster = state.agentRoster;
  const agent = roster ? roster.find(a => a.id === state.thinking) : null;
  const name = agent ? agent.name.toLowerCase() : 'agent';
  return `<div class="thinking"><span class="thinking-dots"><span>‚Ė™</span><span>‚Ė™</span><span>‚Ė™</span></span> ${name} is deliberating</div>`;
}

function renderChairmanVerdict() {
  const v = state.chairmanVerdict;
  if (!v) return '';
  const hasAudio = state.audioData['chairman'];
  const scoreboard = v.scoreboard || [];
  const rankColors = ['gold', 'silver', 'bronze'];

  const scoreboardHtml = scoreboard.length > 0 ? `
    <div class="scoreboard">
      <div class="scoreboard-title">proposal scoreboard</div>
      ${scoreboard.map((p, i) => {
        const rankClass = i < 3 ? rankColors[i] : '';
        const vc = p.vote_counts || {agree:0, disagree:0, amend:0};
        return `<div class="scoreboard-item">
          <div class="scoreboard-rank ${rankClass}">#${i+1}</div>
          <div class="scoreboard-body">
            <div class="scoreboard-proposal-text">${esc(p.text)}</div>
            <div class="scoreboard-meta">
              <span class="scoreboard-author">by ${esc(p.author)} ¬∑ t${(p.turn||0)+1}</span>
              <div class="scoreboard-votes">
                ${vc.agree ? `<span class="scoreboard-vote-pill agree">${vc.agree} agree</span>` : ''}
                ${vc.amend ? `<span class="scoreboard-vote-pill amend">${vc.amend} amend</span>` : ''}
                ${vc.disagree ? `<span class="scoreboard-vote-pill disagree">${vc.disagree} disagree</span>` : ''}
              </div>
              <span class="scoreboard-score">${p.score} pts</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  ` : '';

  return `<div class="chairman-card">
    <div class="chairman-header">
      <div class="chairman-dot"></div>
      <span class="chairman-name">‚óą ${esc(v.agent_name || 'Nexus')}</span>
      <span class="chairman-role">${esc(v.agent_role || 'chairman')}</span>
      <span class="chairman-label">FINAL VERDICT</span>
    </div>
    <div class="chairman-text">${esc(v.text)}</div>
    ${scoreboardHtml}
    ${hasAudio ? `<button class="chairman-audio-btn" onclick="replayChairmanAudio()">[ replay verdict ]</button>` : ''}
  </div>`;
}

async function replayChairmanAudio() {
  const ad = state.audioData['chairman'];
  if (ad) { try { await playAudioB64(ad.b64, ad.format); } catch(e) { console.warn(e); } }
}

function renderMain(app) {
  app.className = 'app';
  const cfg = state.config;
  const proposalCount = state.proposalRecords.length;
  const roster = state.agentRoster || cfg.default_agents || [];
  const ttsLabel = cfg.tts_provider && cfg.tts_provider !== 'none' ? `tts:${cfg.tts_provider}...` : '';

  app.innerHTML = `
    <div class="top-bar">

        ${state.screen === 'complete'

    </div>

        <div class="chat-scroll" id="chat-scroll">
          ${state.messages.map((m,i) => renderMsg(m,i)).join('')}

          ${state.screen === 'complete' ? `
            <div class="final-solution">

              <div class="final-solution-text">
                The agents deliberated over ${state.messages.filter(m=>m.type!=='error').length} rounds on: "${esc(state.topic)}".
                ${proposalCount > 0 ? `${proposalCount} proposal(s) were surfaced and refined.` : ''}
                Final consensus: ${state.consensus}%.
              </div>
            </div>
            <div style="text-align:center;padding:12px;color:var(--text-dim);font-size:11px;letter-spacing:1px">
              // session complete ‚ÄĒ ${state.messages.filter(m=>m.type!=='error').length} rounds ‚ÄĒ ${proposalCount} proposals ‚ÄĒ ${state.consensus}% consensus
            </div>
          ` : ''}
        </div>
        <div class="consensus-bar">
          <span class="consensus-label">// consensus</span>
          <div class="consensus-track">
            <div class="consensus-fill" style="width:${state.consensus}%"></div>
          </div>
          <span class="consensus-pct">${state.consensus}%</span>
        </div>
      </div>
      <div class="side">
        <div class="side-section">
          <div class="side-title">agents</div>
          ${roster.map((a) => {
            const color = AGENT_RAW_COLORS[a.color] || '#ff6b3d';
            return `<div class="agent-info">
              <div class="agent-dot" style="background:${color};box-shadow:0 0 6px ${color}"></div>
              <div>
                <span class="agent-label">${esc((a.name||'').toLowerCase())}</span>
                <span class="agent-role">${a.role || a.mood || ''}</span>
              </div>
            </div>`;
          }).join('')}
          <div class="stats-row">
            <div class="stat-item"><div class="stat-label">rounds</div><div class="stat-value">${state.messages.filter(m=>m.type!=='error').length}</div></div>
            <div class="stat-item"><div class="stat-label">proposals</div><div class="stat-value">${proposalCount}</div></div>
            <div class="stat-item"><div class="stat-label">consensus</div><div class="stat-value" style="font-size:12px;color:var(--green)">${state.consensus}%</div></div>
          </div>
        </div>
        <div class="side-section"><div class="side-title">problem</div><div class="topic-text">${esc(state.topic||'')}</div></div>
        <div class="side-section" style="flex-shrink:0">
          <div class="side-title">proposals [${proposalCount}]</div>
        </div>
        <div class="proposals-scroll">
          ${state.proposalRecords.length === 0
            ? '<div class="proposal-empty">awaiting convergence phase...</div>'
            : state.proposalRecords.map((p, i) => {
                const voteHtml = p.votes ? Object.entries(p.votes).map(([aid, vote]) => {
                  const agent = (state.agentRoster || []).find(a => a.id === aid);
                  const name = agent ? agent.name : aid;
                  return `<span class="vote-badge ${vote}">${name.toLowerCase()}: ${vote}</span>`;
                }).join('') : '';
                return `<div class="proposal-entry">
                  <div class="proposal-author">‚óČ ${esc(p.author || '')} ‚ÄĒ t${(p.turn||0) + 1}</div>
                  <div class="proposal-text">${esc(p.text)}</div>
                  ${voteHtml ? `<div class="vote-row">${voteHtml}</div>` : ''}
                </div>`;
              }).join('')}
        </div>
        <div class="json-toggle">
          <button class="btn" style="width:100%;font-size:10px;letter-spacing:1px" onclick="toggleJson()">${state.showJson?'[ hide json ]':'[ show json ]'}</button>
          ${state.showJson && state.lastProtocol
            ? `<pre class="json-pre">${syntaxHighlight(JSON.stringify(state.lastProtocol,null,2))}</pre>`
            : ''}
        </div>
      </div>
    </div>`;

  if (cfg.tts_enabled && cfg.tts_provider !== 'elevenlabs' && cfg.tts_provider !== 'none') {
    pollTtsReady();
  } else if (cfg.tts_provider === 'elevenlabs') {
    const badge = document.getElementById('tts-badge');
    if (badge) { badge.textContent = 'tts:elevenlabs ‚úď'; badge.className = 'tts-badge ready'; }
  }
}

render();
</script>
